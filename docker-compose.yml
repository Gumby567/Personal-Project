version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bookstore_postgres
    environment:
      POSTGRES_DB: bookstore_db
      POSTGRES_USER: bookstore_user
      POSTGRES_PASSWORD: bookstore_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore_user -d bookstore_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [bookstore_net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookstore_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookstore_db
      DB_USERNAME: bookstore_user
      DB_PASSWORD: bookstore_pass
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [bookstore_net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookstore_frontend
    ports:
      - "80:80"
    depends_on: [backend]
    networks: [bookstore_net]

volumes:
  postgres_data:

networks:
  bookstore_net:
    driver: bridge
